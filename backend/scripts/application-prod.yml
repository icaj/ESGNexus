server:
  port: 8080

spring:
  datasource:
    url: jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:esg_nexus}
    username: ${DB_USER:esg_user}
    password: ${DB_PASSWORD:esg_pass}
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    secret: ${JWT_SECRET:VGhpc0lzQVN1cGVyU2VjcmV0S2V5Rm9yRVNHTmV4dXNBcHAxMjM0NTY3ODkw}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

logging:
  file:
    name: backend.log
  level:
    root: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui.html
