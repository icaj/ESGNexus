services:
  api:
    build: .
    command: uvicorn esg_ml.interfaces.api.principal:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes:
      - ./artifacts:/app/artifacts
      - ./data:/app/data
    depends_on:
      mlflow:
        condition: service_started

  frontend-streamlit:
    build: .
    command: streamlit run frontend_streamlit/app.py --server.address 0.0.0.0 --server.port 8501
    ports:
      - "8501:8501"
    env_file: .env
    environment:
      ESG_NEXUS_API_URL: http://api:8000
      MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes:
      - ./data:/app/data
    depends_on:
      - api

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.2
    command: >
      mlflow ui
      --host 0.0.0.0
      --port 5000
      --default-artifact-root /mlflow/artifacts
    ports:
      - "5000:5000"
    env_file: .env
    volumes:
      - mlflow_artifacts:/mlflow/artifacts

  airflow-init:
    image: apache/airflow:2.9.3
    env_file: .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "${DATABASE_URL}"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    command: version
    volumes:
      - ./airflow/dags:/opt/airflow/dags

  airflow-webserver:
    image: apache/airflow:2.9.3
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    env_file: .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "${DATABASE_URL}"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      ESG_NEXUS_API_URL: http://api:8000
    command: webserver
    ports:
      - "8080:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags

  airflow-scheduler:
    image: apache/airflow:2.9.3
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    env_file: .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "${DATABASE_URL}"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      ESG_NEXUS_API_URL: http://api:8000
    command: scheduler
    volumes:
      - ./airflow/dags:/opt/airflow/dags

volumes:
  mlflow_artifacts:
